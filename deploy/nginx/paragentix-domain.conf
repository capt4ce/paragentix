server {
    listen 80;
    listen [::]:80;
    server_name app-dev.paragentix.com;

    root /home/ubuntu/projects/paragentix/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /static/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app-dev.paragentix.com;

    root /home/ubuntu/projects/paragentix/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    ssl_certificate /etc/letsencrypt/live/app-dev.paragentix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-dev.paragentix.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
